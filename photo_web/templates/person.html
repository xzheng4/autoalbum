{% extends "base.html" %}

{% block title %}{{ person_name }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <a href="/persons" class="text-decoration-none">
            <i class="bi bi-arrow-left"></i> 返回人物列表
        </a>
        <h2 class="mt-2">
            <i class="bi bi-person-circle"></i> {{ person_name }}
        </h2>
    </div>
    <div>
        <span class="text-muted">{{ total }} 张照片</span>
    </div>
</div>

{% if images %}
<div class="photo-grid">
    {% for img in images %}
    <div class="photo-card" onclick="location.href='/image/{{ img.id }}'">
        <img src="data:image/jpeg;base64,{{ img.thumbnail }}" alt="Photo">
    </div>
    {% endfor %}
</div>
{% else %}
<div class="alert alert-info">
    <i class="bi bi-info-circle"></i>
    暂无该成员的照片。
</div>
{% endif %}
{% endblock %}
